<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="660" viewBox="0 0 1000 660"
     font-family="'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#CBD5E1"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="660" fill="#F8FAFC"/>

  <!-- ── TITLE ──────────────────────────────────────────────── -->
  <text x="500" y="34" text-anchor="middle" font-size="17" font-weight="700"
        letter-spacing="0.5" fill="#1E293B">Parallel Agent Autoresearch — Workflow</text>

  <!-- ══════════════════════════════════════════════════════════
       ROW 1 — CONFIG + ORCHESTRATOR
  ══════════════════════════════════════════════════════════ -->

  <rect x="60" y="58" width="168" height="62" rx="10" fill="#334155" filter="url(#shadow)"/>
  <text x="144" y="80" text-anchor="middle" font-size="11" fill="#94A3B8" font-weight="600"
        letter-spacing="1">CONFIG</text>
  <text x="144" y="97" text-anchor="middle" font-size="13" fill="#F1F5F9" font-weight="700">experiment.yaml</text>
  <text x="144" y="112" text-anchor="middle" font-size="10" fill="#94A3B8">n · model · budget · SLURM</text>

  <line x1="228" y1="89" x2="268" y2="89" stroke="#94A3B8" stroke-width="1.8"
        marker-end="url(#arrow)"/>

  <rect x="270" y="52" width="500" height="74" rx="10" fill="#3B82F6" filter="url(#shadow)"/>
  <text x="520" y="74" text-anchor="middle" font-size="11" fill="#BFDBFE" font-weight="600"
        letter-spacing="1">ORCHESTRATOR</text>
  <text x="520" y="93" text-anchor="middle" font-size="13.5" fill="#FFFFFF" font-weight="700">
    main Python process — orchestrator.py
  </text>
  <text x="520" y="113" text-anchor="middle" font-size="10.5" fill="#BFDBFE">
    ① create N git worktrees  ·  ② spawn N processes simultaneously  ·  ③ poll is_alive() only  ·  ④ collect after all done
  </text>

  <!-- arrows down to agents -->
  <line x1="400" y1="126" x2="400" y2="158" stroke="#94A3B8" stroke-width="1.5"
        stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="520" y1="126" x2="520" y2="158" stroke="#94A3B8" stroke-width="1.5"
        stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="640" y1="126" x2="640" y2="158" stroke="#94A3B8" stroke-width="1.5"
        stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="520" y="150" text-anchor="middle" font-size="9.5" fill="#64748B" font-style="italic">
    spawns simultaneously
  </text>

  <!-- ══════════════════════════════════════════════════════════
       PARALLEL BAND
  ══════════════════════════════════════════════════════════ -->
  <rect x="48" y="162" width="904" height="252" rx="12" fill="none"
        stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="68" y="154" width="210" height="18" rx="4" fill="#F8FAFC"/>
  <text x="173" y="166" text-anchor="middle" font-size="10" fill="#64748B" font-weight="600"
        letter-spacing="0.5">PARALLEL EXECUTION — NO CROSS-AGENT COMMUNICATION</text>

  <!-- ══════════════════════════════════════════════════════════
       AGENT BOXES
  ══════════════════════════════════════════════════════════ -->

  <!-- ── Agent 0 ── -->
  <rect x="68" y="174" width="240" height="228" rx="10" fill="#FFFFFF" filter="url(#shadow)"
        stroke="#10B981" stroke-width="2"/>
  <rect x="68" y="174" width="240" height="36" rx="10" fill="#10B981"/>
  <rect x="68" y="196" width="240" height="14" fill="#10B981"/>
  <text x="188" y="188" text-anchor="middle" font-size="11" fill="#ECFDF5" font-weight="700"
        letter-spacing="0.5">agent_0  ·  IsolatedProcess</text>
  <text x="188" y="220" text-anchor="middle" font-size="10" fill="#64748B">
    ClaudeAgentRunner turn loop
  </text>
  <!-- startup row -->
  <rect x="78" y="228" width="220" height="19" rx="4" fill="#FFF7ED"/>
  <text x="88" y="241" font-size="10" fill="#D97706" font-weight="600">⓪ start_gpu_worker.sh</text>
  <text x="256" y="241" font-size="9" fill="#D97706" font-style="italic">once</text>
  <line x1="78" y1="249" x2="298" y2="249" stroke="#E2E8F0" stroke-width="1"/>
  <!-- loop steps -->
  <text x="88" y="264" font-size="11" fill="#1E293B">① hypothesis · edit train.py</text>
  <text x="88" y="281" font-size="11" fill="#1E293B">② git commit</text>
  <text x="88" y="298" font-size="11" fill="#1E293B">③ save_snapshot.py</text>
  <text x="88" y="315" font-size="11" fill="#1E293B">④ run_on_worker.sh</text>
  <text x="88" y="330" font-size="9.5" fill="#F59E0B" font-style="italic">   ← blocks · GPU held · no queue</text>
  <text x="88" y="348" font-size="11" fill="#1E293B">⑤ compare val_bpb</text>
  <text x="88" y="365" font-size="11" fill="#1E293B">⑥ keep · git reset</text>
  <text x="88" y="382" font-size="11" fill="#1E293B">⑦ update_snapshot · log</text>
  <!-- loop arrow -->
  <path d="M 295 390 Q 318 390 318 320 Q 318 260 295 260"
        fill="none" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrow-white)"/>
  <rect x="312" y="312" width="14" height="18" rx="3" fill="#10B981"/>
  <text x="319" y="324" text-anchor="middle" font-size="9" fill="white" font-weight="700">↺</text>
  <text x="188" y="396" text-anchor="middle" font-size="9.5" fill="#6EE7B7" font-weight="600">
    until time budget exhausted
  </text>

  <!-- ── Agent 1 ── -->
  <rect x="380" y="174" width="240" height="228" rx="10" fill="#FFFFFF" filter="url(#shadow)"
        stroke="#10B981" stroke-width="2"/>
  <rect x="380" y="174" width="240" height="36" rx="10" fill="#10B981"/>
  <rect x="380" y="196" width="240" height="14" fill="#10B981"/>
  <text x="500" y="188" text-anchor="middle" font-size="11" fill="#ECFDF5" font-weight="700"
        letter-spacing="0.5">agent_1  ·  IsolatedProcess</text>
  <text x="500" y="220" text-anchor="middle" font-size="10" fill="#64748B">
    ClaudeAgentRunner turn loop
  </text>
  <rect x="390" y="228" width="220" height="19" rx="4" fill="#FFF7ED"/>
  <text x="400" y="241" font-size="10" fill="#D97706" font-weight="600">⓪ start_gpu_worker.sh</text>
  <text x="568" y="241" font-size="9" fill="#D97706" font-style="italic">once</text>
  <line x1="390" y1="249" x2="610" y2="249" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="264" font-size="11" fill="#1E293B">① hypothesis · edit train.py</text>
  <text x="400" y="281" font-size="11" fill="#1E293B">② git commit</text>
  <text x="400" y="298" font-size="11" fill="#1E293B">③ save_snapshot.py</text>
  <text x="400" y="315" font-size="11" fill="#1E293B">④ run_on_worker.sh</text>
  <text x="400" y="330" font-size="9.5" fill="#F59E0B" font-style="italic">   ← blocks · GPU held · no queue</text>
  <text x="400" y="348" font-size="11" fill="#1E293B">⑤ compare val_bpb</text>
  <text x="400" y="365" font-size="11" fill="#1E293B">⑥ keep · git reset</text>
  <text x="400" y="382" font-size="11" fill="#1E293B">⑦ update_snapshot · log</text>
  <path d="M 607 390 Q 630 390 630 320 Q 630 260 607 260"
        fill="none" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrow-white)"/>
  <rect x="624" y="312" width="14" height="18" rx="3" fill="#10B981"/>
  <text x="631" y="324" text-anchor="middle" font-size="9" fill="white" font-weight="700">↺</text>
  <text x="500" y="396" text-anchor="middle" font-size="9.5" fill="#6EE7B7" font-weight="600">
    until time budget exhausted
  </text>

  <!-- ── Agent N ── -->
  <rect x="692" y="174" width="240" height="228" rx="10" fill="#FFFFFF" filter="url(#shadow)"
        stroke="#10B981" stroke-width="2"/>
  <rect x="692" y="174" width="240" height="36" rx="10" fill="#10B981"/>
  <rect x="692" y="196" width="240" height="14" fill="#10B981"/>
  <text x="812" y="188" text-anchor="middle" font-size="11" fill="#ECFDF5" font-weight="700"
        letter-spacing="0.5">agent_N  ·  IsolatedProcess</text>
  <text x="812" y="220" text-anchor="middle" font-size="10" fill="#64748B">
    ClaudeAgentRunner turn loop
  </text>
  <rect x="702" y="228" width="220" height="19" rx="4" fill="#FFF7ED"/>
  <text x="712" y="241" font-size="10" fill="#D97706" font-weight="600">⓪ start_gpu_worker.sh</text>
  <text x="880" y="241" font-size="9" fill="#D97706" font-style="italic">once</text>
  <line x1="702" y1="249" x2="922" y2="249" stroke="#E2E8F0" stroke-width="1"/>
  <text x="712" y="264" font-size="11" fill="#1E293B">① hypothesis · edit train.py</text>
  <text x="712" y="281" font-size="11" fill="#1E293B">② git commit</text>
  <text x="712" y="298" font-size="11" fill="#1E293B">③ save_snapshot.py</text>
  <text x="712" y="315" font-size="11" fill="#1E293B">④ run_on_worker.sh</text>
  <text x="712" y="330" font-size="9.5" fill="#F59E0B" font-style="italic">   ← blocks · GPU held · no queue</text>
  <text x="712" y="348" font-size="11" fill="#1E293B">⑤ compare val_bpb</text>
  <text x="712" y="365" font-size="11" fill="#1E293B">⑥ keep · git reset</text>
  <text x="712" y="382" font-size="11" fill="#1E293B">⑦ update_snapshot · log</text>
  <path d="M 919 390 Q 942 390 942 320 Q 942 260 919 260"
        fill="none" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrow-white)"/>
  <rect x="936" y="312" width="14" height="18" rx="3" fill="#10B981"/>
  <text x="943" y="324" text-anchor="middle" font-size="9" fill="white" font-weight="700">↺</text>
  <text x="812" y="396" text-anchor="middle" font-size="9.5" fill="#6EE7B7" font-weight="600">
    until time budget exhausted
  </text>

  <!-- dots between agent 1 and N -->
  <circle cx="654" cy="290" r="4" fill="#CBD5E1"/>
  <circle cx="666" cy="290" r="4" fill="#CBD5E1"/>
  <circle cx="678" cy="290" r="4" fill="#CBD5E1"/>

  <!-- no-comm badge -->
  <rect x="398" y="420" width="204" height="24" rx="12" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.2"/>
  <text x="500" y="436" text-anchor="middle" font-size="10.5" fill="#DC2626" font-weight="600">
    ✕  agents share no data, context, or files
  </text>

  <!-- ══════════════════════════════════════════════════════════
       SLURM ROW
  ══════════════════════════════════════════════════════════ -->

  <!-- startup allocation arrows (solid amber) -->
  <line x1="188" y1="402" x2="188" y2="455" stroke="#F59E0B" stroke-width="2"
        marker-end="url(#arrow-amber)"/>
  <line x1="500" y1="402" x2="500" y2="455" stroke="#F59E0B" stroke-width="2"
        marker-end="url(#arrow-amber)"/>
  <line x1="812" y1="402" x2="812" y2="455" stroke="#F59E0B" stroke-width="2"
        marker-end="url(#arrow-amber)"/>
  <!-- arrow labels -->
  <text x="210" y="435" font-size="8.5" fill="#D97706" font-style="italic">allocate GPU</text>
  <text x="522" y="435" font-size="8.5" fill="#D97706" font-style="italic">trigger / result</text>
  <text x="834" y="435" font-size="8.5" fill="#D97706" font-style="italic">allocate GPU</text>

  <!-- SLURM box -->
  <rect x="68" y="455" width="864" height="62" rx="10" fill="#FFFBEB" filter="url(#shadow)"
        stroke="#F59E0B" stroke-width="1.8"/>
  <text x="500" y="474" text-anchor="middle" font-size="11" fill="#92400E" font-weight="600"
        letter-spacing="0.5">SLURM CLUSTER</text>
  <text x="500" y="492" text-anchor="middle" font-size="11" fill="#78350F">
    one persistent GPU job per agent · GPU held for full budget · trigger-file RPC
  </text>
  <text x="500" y="508" text-anchor="middle" font-size="10" fill="#A16207">
    run.trigger → train.py → run.result  (2 s poll on shared NFS)  ·  no re-queuing between iterations
  </text>

  <!-- ══════════════════════════════════════════════════════════
       COLLECTOR + MERGE ROW
  ══════════════════════════════════════════════════════════ -->

  <line x1="500" y1="517" x2="500" y2="547" stroke="#94A3B8" stroke-width="1.8"
        marker-end="url(#arrow)"/>
  <text x="390" y="540" font-size="9.5" fill="#64748B" font-style="italic">all agents done</text>

  <rect x="68" y="547" width="380" height="70" rx="10" fill="#6366F1" filter="url(#shadow)"/>
  <text x="258" y="569" text-anchor="middle" font-size="11" fill="#E0E7FF" font-weight="600"
        letter-spacing="0.5">COLLECTOR</text>
  <text x="258" y="587" text-anchor="middle" font-size="12" fill="#FFFFFF" font-weight="700">
    Aggregate results
  </text>
  <text x="258" y="605" text-anchor="middle" font-size="10" fill="#C7D2FE">
    results.tsv · snapshots · reasoning traces
  </text>

  <line x1="448" y1="582" x2="488" y2="582" stroke="#94A3B8" stroke-width="1.8"
        marker-end="url(#arrow)"/>

  <rect x="490" y="547" width="380" height="70" rx="10" fill="#7C3AED" filter="url(#shadow)"/>
  <text x="680" y="569" text-anchor="middle" font-size="11" fill="#EDE9FE" font-weight="600"
        letter-spacing="0.5">MERGE</text>
  <text x="680" y="587" text-anchor="middle" font-size="12" fill="#FFFFFF" font-weight="700">
    Best-params final run
  </text>
  <text x="680" y="605" text-anchor="middle" font-size="10" fill="#DDD6FE">
    best val_bpb per param → merged train.py → SLURM
  </text>

  <line x1="870" y1="582" x2="908" y2="582" stroke="#94A3B8" stroke-width="1.8"
        marker-end="url(#arrow)"/>
  <rect x="910" y="566" width="72" height="32" rx="8" fill="#1E293B"/>
  <text x="946" y="579" text-anchor="middle" font-size="9" fill="#94A3B8" font-weight="600">RESULT</text>
  <text x="946" y="592" text-anchor="middle" font-size="10" fill="#F1F5F9" font-weight="700">val_bpb</text>

  <!-- ── LEGEND ──────────────────────────────────────────────── -->
  <text x="68" y="638" font-size="9.5" fill="#94A3B8">
    Each agent: separate OS process · separate git branch · separate claude --print session · dedicated GPU (persistent SLURM job)
  </text>

</svg>
